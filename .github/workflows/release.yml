name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: "Linux/X11"
            path: "build/linux/StartUpWorld.x86_64"
          - preset: "Windows Desktop"
            path: "build/windows/StartUpWorld.exe"
          - preset: "macOS"
            path: "build/macos/StartUpWorld.zip"
          - preset: "Web"
            path: "build/web/"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export project
        uses: firebelley/godot-export@v5
        with:
          godot_version: "4.6"
          export_preset: "${{ matrix.preset }}"
          export_path: "${{ matrix.path }}"
          cache: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.preset }}"
          path: "${{ matrix.path }}"

  release:
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**

  deploy-web:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: Web
          path: web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
