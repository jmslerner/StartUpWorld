name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: "Linux/X11"
            path: "build/linux/StartUpWorld.x86_64"
          - preset: "Windows Desktop"
            path: "build/windows/StartUpWorld.exe"
          - preset: "macOS"
            path: "build/macos/StartUpWorld.zip"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export project
        uses: firebelley/godot-export@v5
        with:
          godot_version: "4.2.2"
          export_preset: "${{ matrix.preset }}"
          export_path: "${{ matrix.path }}"
          cache: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.preset }}"
          path: "${{ matrix.path }}"

  release:
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**
